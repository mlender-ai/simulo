name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  validate:
    name: Lint + Type Check + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://ci:ci@localhost:5432/ci' }}

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Validate handler output schemas
        run: npm run schema:validate

      - name: Run build
        run: npm run build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-placeholder' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'ci' }}

      - name: Post-build page healthcheck
        run: |
          echo "Starting production server for healthcheck..."
          PORT=3099 npx next start &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 20); do
            if curl -s -o /dev/null http://localhost:3099/ 2>/dev/null; then
              break
            fi
            sleep 1
          done

          # Check all critical pages return 200
          FAILED=0
          for path in "/" "/ux-writing" "/dashboard" "/history" "/settings"; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:3099${path}" 2>/dev/null)
            if [ "$CODE" != "200" ]; then
              echo "❌ ${path} → HTTP ${CODE}"
              FAILED=1
            else
              echo "✅ ${path} → HTTP ${CODE}"
            fi
          done

          kill $SERVER_PID 2>/dev/null

          if [ $FAILED -ne 0 ]; then
            echo "::error::Page healthcheck failed — some pages returned non-200"
            exit 1
          fi
          echo "All pages passed healthcheck"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-placeholder' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'ci' }}

      - name: Type check E2E tests
        run: npm run type-check:e2e

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E Tests
        run: npx playwright test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-placeholder' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'ci' }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Build Figma Plugin
        run: |
          cd figma-plugin
          npm ci
          npm run build
