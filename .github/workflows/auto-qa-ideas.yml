name: Auto QA + Idea Agent

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
    inputs:
      run_ideas:
        description: '아이디어 에이전트 실행'
        required: false
        default: 'true'
        type: boolean
  schedule:
    # 매일 KST 오전 9시 (UTC 0시) — 아이디어 + QA 모두 실행
    - cron: '0 0 * * *'
    # 매일 KST 오후 6시 (UTC 9시) — QA만 추가 실행
    - cron: '0 9 * * *'

jobs:
  # ─────────────────────────────────────────────
  # QA 에이전트: push, PR, 매일 2회 실행
  # ─────────────────────────────────────────────
  auto-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run QA Agent
        id: qa
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'ci' }}
        run: npx tsx scripts/agents/qa-agent.ts
        continue-on-error: true

      - name: Upload QA Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-report-${{ github.run_number }}
          path: qa-reports/
          retention-days: 30

      - name: Create Issue on failure
        if: steps.qa.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('qa-reports').filter(f => f.endsWith('.md'));
            let report = '자동 QA 에이전트가 CRITICAL 이슈를 발견했습니다.';
            if (files.length > 0) {
              const latest = files.sort().pop();
              report = fs.readFileSync(`qa-reports/${latest}`, 'utf8');
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `QA 리포트 — ${new Date().toISOString().split('T')[0]}`,
              body: report.slice(0, 60000),
              labels: ['auto-qa']
            });

  # ─────────────────────────────────────────────
  # 아이디어 에이전트: KST 오전 9시 또는 수동 실행
  # ─────────────────────────────────────────────
  idea-generator:
    # schedule: UTC 0시(KST 9시) 스케줄에만 실행
    # workflow_dispatch: inputs.run_ideas == true 일 때 실행
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_ideas == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Idea Agent
        id: idea
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/agents/idea-agent.ts
        continue-on-error: true

      - name: Check idea output
        id: check
        run: |
          TODAY=$(date +%Y%m%d)
          FILE="ideas/ideas-${TODAY}.md"
          if [ -f "$FILE" ]; then
            echo "created=true" >> $GITHUB_OUTPUT
            echo "file=$FILE" >> $GITHUB_OUTPUT
            echo "[check] 오늘 아이디어 파일 확인됨: $FILE"
          else
            echo "created=false" >> $GITHUB_OUTPUT
            echo "[check] 오늘 아이디어 파일 없음 (에이전트 실패 가능성)"
            exit 1
          fi

      - name: Create Issue with ideas
        if: steps.check.outputs.created == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const file = '${{ steps.check.outputs.file }}';
            const content = fs.readFileSync(file, 'utf8');
            const today = new Date().toISOString().split('T')[0];
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `제품 아이디어 — ${today}`,
              body: content.slice(0, 60000),
              labels: ['idea']
            });
            console.log(`이슈 생성 완료: ${issue.data.html_url}`);

      - name: Notify Slack (optional)
        if: steps.check.outputs.created == 'true' && env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          FILE="${{ steps.check.outputs.file }}"
          TITLE=$(head -1 "$FILE")
          PREVIEW=$(head -20 "$FILE" | tail -15)
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-type: application/json' \
            -d "{\"text\": \"$TITLE\n\`\`\`\n$PREVIEW\n\`\`\`\"}"

      - name: Commit idea file
        if: steps.check.outputs.created == 'true'
        run: |
          git config user.name 'Simulo Agent'
          git config user.email 'agent@simulo.dev'
          git add ideas/
          git diff --staged --quiet || git commit -m "chore: 자동 아이디어 리포트 $(date +%Y-%m-%d)"
          git push

      - name: Report failure
        if: steps.idea.outcome == 'failure' || steps.check.outputs.created == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[에이전트 오류] 아이디어 생성 실패 — ${today}`,
              body: `## 아이디어 에이전트 실행 실패\n\n- **날짜**: ${today}\n- **실행 ID**: ${{ github.run_id }}\n- **원인**: idea-agent.ts 실행 중 오류 발생 또는 파일 미생성\n\n### 확인 사항\n- [ ] \`ANTHROPIC_API_KEY\` 시크릿 설정 확인\n- [ ] [Actions 로그 확인](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n- [ ] 수동 재실행: Actions → Auto QA + Idea Agent → Run workflow`,
              labels: ['bug', 'idea-agent']
            });
