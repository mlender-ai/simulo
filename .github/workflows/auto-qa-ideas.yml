name: Auto QA + Idea Agent

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    # 매일 KST 오전 9시 (UTC 0시) — 아이디어 + QA 모두 실행
    - cron: '0 0 * * *'
    # 매일 KST 오후 6시 (UTC 9시) — QA만 추가 실행
    - cron: '0 9 * * *'

jobs:
  # ─────────────────────────────────────────────
  # QA 에이전트: push, PR, 매일 2회 실행
  # ─────────────────────────────────────────────
  auto-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run QA Agent
        id: qa
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'ci' }}
        run: npx tsx scripts/agents/qa-agent.ts
        continue-on-error: true

      - name: Upload QA Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-report-${{ github.run_number }}
          path: qa-reports/
          retention-days: 30

      - name: Create Issue on failure
        if: steps.qa.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const glob = require('glob');
            const files = fs.readdirSync('qa-reports').filter(f => f.endsWith('.md'));
            let report = '자동 QA 에이전트가 CRITICAL 이슈를 발견했습니다.';
            if (files.length > 0) {
              const latest = files.sort().pop();
              report = fs.readFileSync(`qa-reports/${latest}`, 'utf8');
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `QA 리포트 — ${new Date().toISOString().split('T')[0]}`,
              body: report.slice(0, 60000),
              labels: ['auto-qa']
            });

  # ─────────────────────────────────────────────
  # 아이디어 에이전트: 매일 KST 오전 9시 실행
  # ─────────────────────────────────────────────
  idea-generator:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Idea Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/agents/idea-agent.ts

      - name: Create Issue with ideas
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('ideas').filter(f => f.endsWith('.md') && f !== '.gitkeep');
            if (files.length > 0) {
              const latest = files.sort().pop();
              const content = fs.readFileSync(`ideas/${latest}`, 'utf8');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `제품 아이디어 — ${new Date().toISOString().split('T')[0]}`,
                body: content.slice(0, 60000),
                labels: ['idea']
              });
            }

      - name: Notify Slack (optional)
        if: env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          FILE=$(ls -t ideas/*.md 2>/dev/null | head -1)
          if [ -n "$FILE" ]; then
            TITLE=$(head -1 "$FILE")
            PREVIEW=$(head -20 "$FILE" | tail -15)
            curl -s -X POST "$SLACK_WEBHOOK" \
              -H 'Content-type: application/json' \
              -d "{\"text\": \"$TITLE\n\`\`\`\n$PREVIEW\n\`\`\`\"}"
          fi

      - name: Commit idea file
        run: |
          git config user.name 'Simulo Agent'
          git config user.email 'agent@simulo.dev'
          git add ideas/
          git diff --staged --quiet || git commit -m "chore: 자동 아이디어 리포트 $(date +%Y-%m-%d)"
          git push
