<!doctype html><html><head><meta charset="utf-8"><style>* { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d0d0d;
      color: #e5e5e5;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logo { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }

    #settingsBtn {
      background: transparent;
      border: 1px solid #222;
      border-radius: 6px;
      color: #666;
      font-size: 13px;
      padding: 4px 8px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    #settingsBtn:hover { color: #aaa; border-color: #333; }
    #settingsBtn.active { color: #e5e5e5; border-color: #444; }

    /* ── Settings panel ── */
    .settings-panel {
      display: none;
      padding: 14px 16px;
      border-bottom: 1px solid #1a1a1a;
      background: #0f0f0f;
      flex-shrink: 0;
      flex-direction: column;
      gap: 10px;
    }
    .settings-panel.visible { display: flex; }

    label {
      font-size: 11px;
      color: #666;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 4px;
      display: block;
    }
    input, select {
      width: 100%;
      background: #111;
      border: 1px solid #222;
      border-radius: 6px;
      color: #e5e5e5;
      font-size: 13px;
      padding: 8px 10px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: #444; }
    .settings-hint { font-size: 11px; color: #555; margin-top: 4px; }

    /* ── Free mode banner ── */
    .free-mode-banner {
      display: none;
      padding: 8px 12px;
      background: #431407;
      border: 1px solid #7c2d12;
      color: #fdba74;
      font-size: 11px;
      line-height: 1.5;
      margin: 8px 16px 0;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .free-mode-banner.visible { display: block; }

    /* ── Error message ── */
    .error-msg {
      display: none;
      padding: 10px 12px;
      background: #1a0a0a;
      border: 1px solid #3a1a1a;
      border-radius: 6px;
      color: #fca5a5;
      font-size: 12px;
      margin: 8px 16px 0;
      flex-shrink: 0;
    }
    .error-msg.visible { display: block; }

    /* ── Chat container ── */
    .chat-container {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      color: #444;
      gap: 10px;
    }
    .empty-state.hidden { display: none; }
    .empty-state-icon { font-size: 32px; opacity: 0.25; }
    .empty-state-text { font-size: 13px; text-align: center; line-height: 1.6; }

    /* ── Chat messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px 14px;
    }
    .chat-messages.hidden { display: none; }

    /* ── Chat message styles ── */
    .chat-msg { display: flex; flex-direction: column; gap: 4px; }
    .chat-msg-bot .chat-bubble {
      background: #141414;
      border: 1px solid #1f1f1f;
      border-radius: 0 10px 10px 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: #ccc;
      line-height: 1.55;
      max-width: 100%;
    }
    .chat-msg-user { align-items: flex-end; }
    .chat-msg-user .chat-bubble {
      background: #1a2a1a;
      border: 1px solid #2a3a2a;
      border-radius: 10px 10px 0 10px;
      padding: 8px 12px;
      font-size: 12px;
      color: #a3e635;
      max-width: 85%;
    }
    .chat-msg-system .chat-bubble {
      background: transparent;
      border: none;
      padding: 4px 0;
      font-size: 11px;
      color: #3a3a3a;
      text-align: center;
    }

    /* ── Label chips ── */
    .chat-labels {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-top: 6px;
    }
    .chat-label-chip {
      padding: 5px 11px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      font-size: 11px;
      color: #bbb;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.12s, color 0.12s, transform 0.1s;
    }
    .chat-label-chip:hover { border-color: #555; color: #e5e5e5; transform: scale(1.03); }
    .chat-label-chip.disabled { opacity: 0.35; cursor: default; pointer-events: none; }

    /* ── Follow-up buttons ── */
    .chat-followups {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding-top: 6px;
    }
    .chat-followup-btn {
      padding: 7px 11px;
      background: #111;
      border: 1px solid #222;
      border-radius: 6px;
      font-size: 11px;
      color: #aaa;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
    }
    .chat-followup-btn:hover { border-color: #444; color: #e5e5e5; }
    .chat-followup-btn.disabled { opacity: 0.35; cursor: default; pointer-events: none; }

    /* ── Action buttons ── */
    .chat-actions { display: flex; flex-wrap: wrap; gap: 5px; padding-top: 6px; }
    .chat-action-btn {
      padding: 5px 10px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 5px;
      font-size: 11px;
      color: #aaa;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
    }
    .chat-action-btn:hover { border-color: #555; color: #e5e5e5; }
    .chat-action-btn.primary {
      background: #0f1f0f;
      border-color: #2a4a2a;
      color: #a3e635;
      font-weight: 500;
    }
    .chat-action-btn.primary:hover { border-color: #4a7a4a; color: #ccff66; background: #142a14; }

    /* ── Animations ── */
    @keyframes msgFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .chat-msg { animation: msgFadeIn 0.18s ease; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .streaming-cursor::after { content: "▋"; animation: blink 0.7s infinite; color: #a3e635; font-size: 10px; }

    /* ── Mini report ── */
    .mini-report {
      background: #0f1f0f;
      border: 1px solid #1a2e1a;
      border-radius: 8px;
      padding: 12px;
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: msgFadeIn 0.22s ease;
    }
    .mini-report-summary { font-size: 12px; font-weight: 600; color: #a3e635; }
    .mini-finding {
      padding: 8px;
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 6px;
      cursor: pointer;
    }
    .mini-finding-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .sev-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .sev-0 { background: #4ade80; }
    .sev-1 { background: #93c5fd; }
    .sev-2 { background: #fbbf24; }
    .sev-3 { background: #f97316; }
    .sev-4 { background: #f87171; }
    .mini-finding-criterion { font-size: 10px; color: #888; }
    .mini-finding-oneliner { font-size: 11px; color: #ccc; font-weight: 500; }
    .mini-finding-detail { font-size: 11px; color: #888; margin-top: 4px; line-height: 1.5; }
    .mini-finding-fix { font-size: 11px; color: #86efac; margin-top: 3px; line-height: 1.5; }
    .mini-finding-fix-label { font-size: 9px; font-weight: 700; color: #4ade80; background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.25); border-radius: 3px; padding: 1px 5px; margin-right: 5px; }
    .mini-finding-collapsed .mini-finding-detail,
    .mini-finding-collapsed .mini-finding-fix { display: none; }

    /* ── Live comment popup ── */
    .live-comment-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: msgFadeIn 0.15s ease;
    }
    .live-comment-overlay.live-comment-hide { opacity: 0; transition: opacity 0.2s; }
    .live-comment-box {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 18px;
      width: 330px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .live-comment-title { font-size: 13px; font-weight: 600; color: #e5e5e5; }
    .live-comment-desc { font-size: 12px; color: #888; line-height: 1.55; }
    .live-comment-desc strong { color: #bbb; }
    .live-comment-text {
      width: 100%;
      height: 140px;
      background: #0d0d0d;
      border: 1px solid #222;
      border-radius: 6px;
      color: #888;
      font-size: 11px;
      padding: 8px 10px;
      font-family: monospace;
      resize: none;
      line-height: 1.5;
    }
    .btn-primary {
      width: 100%;
      padding: 11px;
      background: #e5e5e5;
      color: #0d0d0d;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.9; }

    /* ── Fix toast ── */
    .fix-toast {
      position: fixed;
      bottom: 56px;
      left: 16px;
      right: 16px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      z-index: 100;
      animation: toast-in 0.2s ease;
    }
    .fix-toast-success {
      background: #14532d;
      color: #86efac;
      border: 1px solid #166534;
    }
    .fix-toast-error {
      background: #450a0a;
      color: #fca5a5;
      border: 1px solid #7f1d1d;
    }
    .fix-toast-hide { opacity: 0; transition: opacity 0.3s; }
    @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Chat input bar ── */
    .chat-input-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-top: 1px solid #1a1a1a;
      background: #0d0d0d;
      flex-shrink: 0;
    }
    #chatResetBtn {
      width: 30px; height: 30px;
      background: transparent;
      border: 1px solid #222;
      border-radius: 6px;
      color: #555;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
      transition: all 0.12s;
    }
    #chatResetBtn:hover { color: #aaa; border-color: #333; }
    .chat-input-bar input {
      flex: 1;
      background: #111;
      border: 1px solid #222;
      border-radius: 6px;
      color: #e5e5e5;
      font-size: 12px;
      padding: 7px 10px;
      height: auto;
      width: auto;
    }
    .chat-input-bar input:focus { border-color: #333; outline: none; }
    #chatSendBtn {
      width: 30px; height: 30px;
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      border-radius: 6px;
      color: #a3e635;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
    }
    #chatSendBtn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Misc (preserved from original) ── */
    .free-mode-banner.visible { display: block; }

    /* score / report styles preserved for legacy functions */
    .score-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
    .score-num { font-size: 36px; font-weight: 700; font-family: monospace; }
    .verdict-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 4px; letter-spacing: 0.03em; }
    .verdict-pass { background: #14532d; color: #86efac; }
    .verdict-partial { background: #431407; color: #fdba74; }
    .verdict-fail { background: #450a0a; color: #fca5a5; }
    .summary { font-size: 13px; color: #aaa; line-height: 1.7; margin-bottom: 16px; padding: 12px; background: #111; border-radius: 6px; border: 1px solid #1a1a1a; }
    .section-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .strength-item { font-size: 12px; color: #aaa; padding: 6px 0; border-bottom: 1px solid #1a1a1a; }
    .strength-item:last-child { border-bottom: none; }
    .issue-item { padding: 10px 12px; background: #111; border: 1px solid #1a1a1a; border-radius: 6px; margin-bottom: 8px; }
    .issue-severity { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 3px; margin-bottom: 5px; display: inline-block; }
    .sev-critical { background: #450a0a; color: #fca5a5; }
    .sev-medium { background: #431407; color: #fdba74; }
    .sev-low { background: #1a1a1a; color: #888; }
    .issue-screen { font-size: 10px; color: #555; margin-left: 6px; font-family: monospace; }
    .issue-text { font-size: 12px; color: #ccc; margin: 4px 0; }
    .issue-rec { font-size: 11px; color: #666; }
    .tab-bar { display: flex; gap: 0; margin-bottom: 14px; border-bottom: 1px solid #1a1a1a; }
    .tab { padding: 8px 14px; font-size: 12px; color: #555; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; user-select: none; }
    .tab.active { color: #e5e5e5; border-bottom-color: #e5e5e5; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .btn-secondary { width: 100%; padding: 9px; background: transparent; color: #666; border: 1px solid #222; border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 12px; font-family: inherit; }
    .btn-secondary:hover { color: #aaa; border-color: #333; }
    .empty { color: #555; font-size: 12px; padding: 8px 0; }
    .think-wrap { margin-bottom: 10px; }
    .think-screen { font-size: 11px; color: #555; margin-bottom: 4px; }
    .think-aloud { font-size: 13px; color: #999; line-height: 1.7; font-style: italic; padding: 10px 12px; background: #111; border-left: 2px solid #333; border-radius: 0 6px 6px 0; }
    .score-good { color: #86efac; }
    .score-ok { color: #fdba74; }
    .score-bad { color: #fca5a5; }
    .writing-issue { padding: 10px 12px; background: #111; border: 1px solid #1a1a1a; border-radius: 6px; margin-bottom: 8px; }
    .writing-issue-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .writing-principle { font-size: 10px; color: #444; margin-left: auto; }
    .writing-compare { display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px; }
    .writing-before, .writing-after { display: flex; gap: 8px; align-items: baseline; padding: 6px 8px; border-radius: 4px; background: #0a0a0a; }
    .writing-label { font-size: 10px; color: #555; flex-shrink: 0; min-width: 24px; }
    .writing-label-good { color: #86efac; }
    .writing-text-del { font-size: 12px; color: #666; text-decoration: line-through; }
    .writing-text-new { font-size: 12px; color: #e5e5e5; }
    .writing-reason { font-size: 11px; color: #555; line-height: 1.5; }
    .writing-frame-result { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #1a1a1a; }
    .writing-frame-result:last-child { border-bottom: none; }
    .writing-frame-name { font-size: 12px; color: #888; }
    .fix-badge { font-size: 9px; padding: 2px 6px; border-radius: 3px; background: #1a1a1a; color: #555; margin-left: auto; flex-shrink: 0; }
    .fix-badge.fix-applied { background: #14532d; color: #86efac; }
    .fix-all-btn { width: 100%; padding: 9px; background: #14532d; color: #86efac; border: 1px solid #166534; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; margin-bottom: 12px; font-family: inherit; transition: opacity 0.15s; }
    .fix-all-btn:hover { opacity: 0.85; }
    .fix-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .fix-all-btn.fix-applied { background: #1a1a1a; color: #555; border-color: #222; }
    .variant-card { border: 1px solid #222; border-radius: 6px; padding: 10px; margin-bottom: 8px; background: #111; }
    .variant-text { font-size: 13px; color: #e5e5e5; margin-bottom: 4px; font-weight: 500; }
    .variant-reason { font-size: 11px; color: #666; margin-bottom: 8px; line-height: 1.4; }
    .variant-apply-btn { font-size: 11px; padding: 4px 10px; border-radius: 4px; border: 1px solid #333; background: transparent; color: #93c5fd; cursor: pointer; font-family: inherit; }
    .variant-apply-btn:hover { background: rgba(147,197,253,0.1); }
    .variant-apply-btn:disabled { color: #86efac; border-color: #166534; cursor: default; }
    .btn-sheets { width: 100%; padding: 11px; background: #1a4d2e; color: #86efac; border: 1px solid #166534; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
    .btn-sheets:hover { opacity: 0.85; }
    .btn-sheets:disabled { opacity: 0.4; cursor: not-allowed; }
    .improvement-category-header { font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin: 12px 0 6px; padding-left: 2px; }
    .improvement-category-header:first-child { margin-top: 0; }
    .improvement-item { padding: 10px 12px; background: #111; border: 1px solid #1a1a1a; border-left: 3px solid #3b82f6; border-radius: 6px; margin-bottom: 8px; }
    .improvement-problem { font-size: 12px; color: #ccc; margin-bottom: 5px; line-height: 1.5; }
    .improvement-problem-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .improvement-fix { font-size: 12px; color: #86efac; line-height: 1.5; }
    .fix-label { display: inline-block; font-size: 9px; font-weight: 700; color: #4ade80; background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.25); border-radius: 3px; padding: 1px 5px; margin-right: 6px; vertical-align: middle; letter-spacing: 0.03em; }
    .improvement-badges { margin-top: 6px; font-size: 11px; color: #555; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
    .badge-label { color: #555; font-size: 10px; }
    .effort-badge, .impact-badge { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 3px; }
    .effort-low { background: #14532d; color: #86efac; }
    .effort-mid { background: #1a1a1a; color: #888; }
    .effort-high { background: #450a0a; color: #fca5a5; }
    .impact-high { background: #1e3a5f; color: #93c5fd; }
    .impact-mid { background: #1a1a1a; color: #888; }
    .impact-low { background: #1a1a1a; color: #555; }
    .score-breakdown { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .score-breakdown-item { padding: 6px 10px; background: #111; border: 1px solid #1a1a1a; border-radius: 6px; font-size: 11px; }
    .score-breakdown-label { color: #666; }
    .score-breakdown-value { color: #e5e5e5; font-weight: 600; margin-left: 4px; }
    .feedback-bar { padding: 12px 16px; border-top: 1px solid #1a1a1a; background: #0d0d0d; }
    .feedback-prompt { font-size: 11px; color: #555; margin-bottom: 8px; }
    .feedback-btns { display: flex; gap: 8px; }
    .feedback-btn { flex: 1; padding: 8px; border: 1px solid #222; border-radius: 6px; background: #111; color: #888; font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: inherit; text-align: center; }
    .feedback-btn:hover { border-color: #333; color: #ccc; }
    .feedback-btn.selected-good { background: #14532d; border-color: #166534; color: #86efac; }
    .feedback-btn.selected-bad { background: #450a0a; border-color: #7f1d1d; color: #fca5a5; }
    .feedback-comment { margin-top: 8px; display: none; }
    .feedback-comment.visible { display: block; }
    .feedback-comment textarea { width: 100%; height: 60px; background: #111; border: 1px solid #222; border-radius: 6px; color: #e5e5e5; font-size: 12px; padding: 8px 10px; font-family: inherit; resize: none; outline: none; }
    .feedback-comment textarea:focus { border-color: #444; }

n- ✗ "본 서비스 이용 시 마일리지가 적립됩니다" → ✓ "광고를 보면 마일리지를 받아요"\n- ✗ "보상 미수령 건이 있습니다" → ✓ "아직 받지 않은 보너스가 있어요"\n\n### 원칙2: 다음 행동이 예측되는 문장을 쓴다\nCTA는 누른 뒤 무엇이 일어날지 직접 말한다.\n- ✗ "확인" → ✓ "마일리지 받기"\n- ✗ "시작하기" → ✓ "잠자기 시간 정하기"\n- ✗ "더 보기" → ✓ "오늘 받을 보너스 보기"\n\n### 원칙3: 군더더기를 뺀다\n뺐을 때 의미가 변하지 않는 단어는 빼야 한다.\n금지 군더더기: "혹시", "잠깐", "한번", "지금 바로", "당장", "공짜", "열심히", "~하실 수 있는"\n\n### 원칙4: 한 문장에 한 메시지를 담는다\n여러 정보를 한 문장에 욱여넣으면 4060 사용자에게 부담스럽다.\n\n### 원칙5: 따뜻한 감정으로 격려한다\n사실만 건조하게 적시하지 않는다. 격려, 응원, 기대감을 준다.\n- ✗ "오늘 5,034걸음을 걸었어요" → ✓ "오늘도 잘하고 있어요"\n\n### 원칙6: 입으로 말할 수 있는 문장을 쓴다\n소리 내어 읽었을 때 어색하면 다시 쓴다. 한자어, 문어체, 긴 호흡 문장 금지.\n- ✗ "보상 지급이 완료되었습니다" → ✓ "보너스 마일리지를 받았어요"\n\n### 원칙7: 권유하되 강요하지 않는다\n손실 회피는 야핏무브의 핵심 메커니즘이나 표현이 공격적이지 않게 한다.\n\n### 원칙8: 모두가 이해할 수 있는 말을 쓴다\n외래어, 줄임말, 인터넷 밈은 거리감을 만든다.\n야핏무브 내부 용어(에너지, 두두, 마일리지, 마일리지샵, 보너스 마일리지)는 허용.\n\n## 제품 라이팅 원칙 (화면 단위)\n- 한 화면, 하나의 핵심 메시지\n- 같은 단어를 한 화면에서 반복하지 않는다 (동일 명사 3회 이상 = 정리되지 않은 인상)\n- 원페이지 원액션: 타이틀 1줄 + CTA 1개만 봤을 때 행동할 수 있어야 한다\n\n## 심각도 기준\n- **critical**: 사용자가 오해하거나 행동하지 못하는 텍스트\n- **warning**: 개선하면 전환율/만족도가 올라가는 텍스트\n- **info**: 더 나은 대안이 있는 텍스트\n\n## principle 값 (반드시 아래 중 하나)\n"한눈에 이해", "행동 예측", "군더더기 제거", "한 문장 한 메시지", "따뜻한 격려", "구어체", "권유/비강요", "쉬운 말", "두두 원칙", "원페이지 원액션", "단어 반복 금지", "해요체", "정직한 표현"\n\n## 응답 형식\n반드시 아래 JSON 형식으로 응답하세요. JSON 외 다른 텍스트를 포함하지 마세요.\n\n{\n  "summary": "전체 UX 라이팅에 대한 1-2문장 요약",\n  "score": 0-100,\n  "issues": [\n    {\n      "location": "텍스트가 위치한 UI 요소",\n      "original": "원본 텍스트",\n      "suggestion": "개선된 텍스트",\n      "reason": "어떤 원칙을 위반했는지 + 왜 변경해야 하는지",\n      "severity": "critical | warning | info",\n      "principle": "위 principle 값 중 하나"\n    }\n  ],\n  "strengths": ["매뉴얼 기준으로 잘 작성된 텍스트에 대한 칭찬"],\n  "screenLevel": {\n    "hasOneKeyMessage": true/false,\n    "hasWordRepetition": true/false,\n    "repeatedWords": ["반복된 단어"],\n    "ctaCount": 0,\n    "ctaClarity": "CTA가 행동을 예측하게 하는지 평가"\n  }\n}';try{const l=[];for(let c=0;c<e.length;c++){U(m?(0,o.t)("writing.frameAnalyzingFree",{i:c+1,n:e.length}):(
